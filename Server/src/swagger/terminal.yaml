openapi: 3.0.0
info:
  title: Terminal API
  version: 1.1.0
  description: API for managing terminals under carriers, with addresses and notes, including pagination and search

tags:
  - name: Terminal
    description: Operations related to terminals

paths:
  /api/maintenance/terminal:
    post:
      tags: [Terminal]
      summary: Create a new terminal
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTerminalRequest"
      responses:
        "201":
          description: Terminal created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerminalResponse"
        "400":
          description: Failed to create terminal

  /api/maintenance/terminal/{terminalId}:
    get:
      tags: [Terminal]
      summary: Get a terminal by ID
      security:
        - bearerAuth: []
      parameters:
        - name: terminalId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Terminal details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerminalResponse"
        "404":
          description: Terminal not found
    put:
      tags: [Terminal]
      summary: Update a terminal (including addresses)
      security:
        - bearerAuth: []
      parameters:
        - name: terminalId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTerminalRequest"
      responses:
        "200":
          description: Terminal updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerminalResponse"
        "400":
          description: Failed to update terminal
    delete:
      tags: [Terminal]
      summary: Soft delete a terminal
      security:
        - bearerAuth: []
      parameters:
        - name: terminalId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Terminal deleted successfully
        "400":
          description: Failed to delete terminal

  /api/maintenance/terminal/carrier/{carrierId}:
    get:
      tags: [Terminal]
      summary: Get all terminals for a carrier (with pagination and search)
      security:
        - bearerAuth: []
      parameters:
        - name: carrierId
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
          description: Page number (default 1)
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 10
          description: Number of records per page (default 10)
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Search term to filter terminals by name
      responses:
        "200":
          description: Paginated list of terminals
          content:
            application/json:
              schema:
                type: object
                properties:
                  terminals:
                    type: array
                    items:
                      $ref: "#/components/schemas/TerminalResponse"
                  total:
                    type: integer
                  page:
                    type: integer
                  pageSize:
                    type: integer
        "400":
          description: Failed to fetch terminals

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Terminal:
      type: object
      properties:
        terminalId: { type: integer }
        carrierId: { type: integer }
        entityId: { type: integer }
        terminalName: { type: string }
        rmAccountNumber: { type: string }
        airportCode: { type: string }
        email: { type: string, nullable: true }
        phoneNumber: { type: string, nullable: true }
        faxNumber: { type: string, nullable: true }
        openTime: { type: string, format: time, nullable: true }
        closeTime: { type: string, format: time, nullable: true }
        hours: { type: string, nullable: true }
        activeStatus:
          type: string
          enum: [Y, N]
        createdAt: { type: string, format: date-time }
        createdBy: { type: integer }
        updatedAt: { type: string, format: date-time, nullable: true }
        updatedBy: { type: integer, nullable: true }
        noteThreadId: { type: integer, nullable: true }

    Address:
      type: object
      properties:
        addressId: { type: integer }
        line1: { type: string }
        line2: { type: string, nullable: true }
        city: { type: string }
        state: { type: string }
        zipCode: { type: string }
        addressRole: { type: string }

    CreateAddressRequest:
      type: object
      required: [line1, city, state, zipCode, addressRole]
      properties:
        line1: { type: string }
        line2: { type: string, nullable: true }
        city: { type: string }
        state: { type: string }
        zipCode: { type: string }
        addressRole: { type: string }

    UpdateAddressRequest:
      type: object
      properties:
        addressId: { type: integer }
        line1: { type: string }
        line2: { type: string, nullable: true }
        city: { type: string }
        state: { type: string }
        zipCode: { type: string }
        addressRole: { type: string }

    Note:
      type: object
      properties:
        noteMessageId: { type: integer }
        noteThreadId: { type: integer }
        messageText: { type: string }
        createdAt: { type: string, format: date-time }
        createdBy: { type: integer }

    CreateTerminalRequest:
      type: object
      required: [carrierId, terminalName, rmAccountNumber, airportCode]
      properties:
        carrierId: { type: integer }
        terminalName: { type: string }
        rmAccountNumber: { type: string }
        airportCode: { type: string }
        email: { type: string, nullable: true }
        phoneNumber: { type: string, nullable: true }
        faxNumber: { type: string, nullable: true }
        openTime: { type: string, format: time, nullable: true }
        closeTime: { type: string, format: time, nullable: true }
        hours: { type: string, nullable: true }
        addresses:
          type: array
          items:
            $ref: "#/components/schemas/CreateAddressRequest"
        note:
          type: object
          properties:
            messageText: { type: string }

    UpdateTerminalRequest:
      type: object
      properties:
        terminalName: { type: string }
        rmAccountNumber: { type: string }
        airportCode: { type: string }
        email: { type: string, nullable: true }
        phoneNumber: { type: string, nullable: true }
        faxNumber: { type: string, nullable: true }
        openTime: { type: string, format: time, nullable: true }
        closeTime: { type: string, format: time, nullable: true }
        hours: { type: string, nullable: true }
        addresses:
          type: array
          items:
            $ref: "#/components/schemas/UpdateAddressRequest"

    TerminalResponse:
      allOf:
        - $ref: "#/components/schemas/Terminal"
        - type: object
          properties:
            addresses:
              type: array
              items:
                $ref: "#/components/schemas/Address"
            notes:
              type: array
              items:
                $ref: "#/components/schemas/Note"
