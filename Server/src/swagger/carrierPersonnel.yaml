openapi: 3.0.0
info:
  title: Carrier Personnel API
  version: 1.1.0
  description: API for managing personnel records linked to terminals

tags:
  - name: Carrier Personnel
    description: Operations related to carrier personnel

paths:
  /api/maintenance/carrier-personnel:
    post:
      tags: [Carrier Personnel]
      summary: Create a new personnel record
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCarrierPersonnelRequest"
      responses:
        "201":
          description: Personnel created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarrierPersonnelResponse"
        "400":
          description: Failed to create personnel

  /api/maintenance/carrier-personnel/{personnelId}:
    get:
      tags: [Carrier Personnel]
      summary: Get personnel by ID
      security:
        - bearerAuth: []
      parameters:
        - name: personnelId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Personnel record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarrierPersonnelResponse"
        "404":
          description: Personnel not found
    put:
      tags: [Carrier Personnel]
      summary: Update personnel record
      security:
        - bearerAuth: []
      parameters:
        - name: personnelId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCarrierPersonnelRequest"
      responses:
        "200":
          description: Personnel updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarrierPersonnelResponse"
        "400":
          description: Failed to update personnel
    delete:
      tags: [Carrier Personnel]
      summary: Soft delete personnel record
      security:
        - bearerAuth: []
      parameters:
        - name: personnelId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Personnel deleted (soft delete)
        "400":
          description: Failed to delete personnel

  /api/maintenance/carrier-personnel/terminal/{terminalId}:
    get:
      tags: [Carrier Personnel]
      summary: Get all personnel for a terminal (with search & pagination)
      security:
        - bearerAuth: []
      parameters:
        - name: terminalId
          in: path
          required: true
          schema:
            type: integer
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: searchTerm
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of personnel
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  page:
                    type: integer
                  pageSize:
                    type: integer
                  searchTerm:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CarrierPersonnelResponse"
        "400":
          description: Failed to fetch personnel

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CarrierPersonnel:
      type: object
      properties:
        personnelId: { type: integer }
        terminalId: { type: integer }
        name: { type: string }
        personType: { type: string }
        email: { type: string }
        officePhoneNumber: { type: string }
        cellPhoneNumber: { type: string }
        createdAt: { type: string, format: date-time }
        createdBy: { type: integer }
        updatedAt: { type: string, format: date-time }
        updatedBy: { type: integer }
        activeStatus: { type: string, enum: [Y, N] }

    CreateCarrierPersonnelRequest:
      type: object
      required:
        - terminalId
        - name
        - personType
        - email
      properties:
        terminalId: { type: integer }
        name: { type: string }
        personType: { type: string }
        email: { type: string }
        officePhoneNumber: { type: string }
        cellPhoneNumber: { type: string }
        note:
          type: object
          properties:
            messageText: { type: string }

    UpdateCarrierPersonnelRequest:
      type: object
      properties:
        terminalId: { type: integer }
        name: { type: string }
        personType: { type: string }
        email: { type: string }
        officePhoneNumber: { type: string }
        cellPhoneNumber: { type: string }

    CarrierPersonnelResponse:
      allOf:
        - $ref: "#/components/schemas/CarrierPersonnel"
        - type: object
          properties:
            terminalName:
              type: string
              description: Name of the terminal linked to this personnel
