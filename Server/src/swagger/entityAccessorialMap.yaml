openapi: 3.0.0
info:
  title: Entity Accessorial Map API
  version: 1.2.0
  description: API for mapping accessorials to entities (e.g., Station, Carrier, Terminal) with charge type, value, notes, and service availability

tags:
  - name: Entity Accessorial Map
    description: Operations related to entity-accessorial mappings

paths:
  /api/maintenance/entity-accessorial:
    post:
      tags: [Entity Accessorial Map]
      summary: Create a new entity-accessorial mapping
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEntityAccessorialMapRequest"
      responses:
        "201":
          description: Mapping created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityAccessorialMapResponse"
        "400":
          description: Failed to create mapping

  /api/maintenance/entity-accessorial/{entityId}:
    get:
      tags: [Entity Accessorial Map]
      summary: Get all accessorial mappings for a given entity
      security:
        - bearerAuth: []
      parameters:
        - name: entityId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of accessorial mappings for the entity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EntityAccessorialMapResponse"
        "400":
          description: Failed to fetch mappings

  /api/maintenance/entity-accessorial/{entityAccessorialId}:
    put:
      tags: [Entity Accessorial Map]
      summary: Update an entity-accessorial mapping
      security:
        - bearerAuth: []
      parameters:
        - name: entityAccessorialId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEntityAccessorialMapRequest"
      responses:
        "200":
          description: Mapping updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityAccessorialMapResponse"
        "400":
          description: Failed to update mapping
    delete:
      tags: [Entity Accessorial Map]
      summary: Delete an entity-accessorial mapping
      security:
        - bearerAuth: []
      parameters:
        - name: entityAccessorialId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Mapping deleted successfully
        "400":
          description: Failed to delete mapping

  /api/maintenance/entity-accessorial/{entityAccessorialId}/service-not-offered:
    put:
      tags: [Entity Accessorial Map]
      summary: Change serviceNotOffered flag for a mapping
      description: Toggle or update the serviceNotOffered flag for a specific entity-accessorial mapping.
      security:
        - bearerAuth: []
      parameters:
        - name: entityAccessorialId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                serviceNotOffered:
                  type: string
                  enum: [Y, N]
                  description: Whether the service is not offered (Y/N)
      responses:
        "200":
          description: Flag updated successfully
        "400":
          description: Failed to update flag

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    EntityAccessorialMap:
      type: object
      properties:
        entityAccessorialId:
          type: integer
        entityId:
          type: integer
        accessorialId:
          type: integer
        chargeType:
          type: string
        chargeValue:
          type: number
          format: decimal
        noteThreadId:
          type: integer
          nullable: true
        serviceNotOffered:
          type: string
          enum: [Y, N]
          description: Flag indicating if the service is not offered

    CreateEntityAccessorialMapRequest:
      type: object
      required: [entityId, accessorialId, chargeType, chargeValue]
      properties:
        entityId: { type: integer }
        accessorialId: { type: integer }
        chargeType: { type: string, enum: [PER_POUND, FLAT_VALUE] }
        chargeValue: { type: number, format: decimal }
        note:
          type: object
          properties:
            messageText: { type: string }

    UpdateEntityAccessorialMapRequest:
      type: object
      properties:
        chargeType: { type: string, enum: [PER_POUND, FLAT_VALUE] }
        chargeValue: { type: number, format: decimal }
        note:
          type: object
          properties:
            messageText: { type: string }

    EntityAccessorialMapResponse:
      allOf:
        - $ref: "#/components/schemas/EntityAccessorialMap"
        - type: object
          properties:
            accessorialName: { type: string }
            notes:
              type: array
              items:
                type: object
                properties:
                  noteMessageId: { type: integer }
                  noteThreadId: { type: integer }
                  messageText: { type: string }
                  createdAt: { type: string, format: date-time }
                  createdBy: { type: integer }
