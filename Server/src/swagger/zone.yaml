openapi: 3.0.0
info:
  title: Zone API
  version: 1.0.0
  description: API for managing zones and their zip code mappings

tags:
  - name: Zone
    description: Operations related to zones

paths:
  /api/maintenance/zone:
    post:
      tags: [Zone]
      summary: Create a new zone
      description: >
        Creates a new zone with a name, optional individual zip codes, optional zip ranges, 
        and an optional note. Before creation, the service checks whether any of the provided 
        zips or ranges already belong to existing zones. If conflicts are found, the request 
        fails unless the query parameter `force=true` is provided to allow duplicates.
        On success, the response includes the newly created zone. On conflict, the response 
        includes the conflicting zips and the list of zones that already contain them.
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: force
          required: false
          schema:
            type: boolean
            default: false
          description: >
            If true, allows creating a zone even if some zips already belong to other zones.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateZoneRequest"
      responses:
        "201":
          description: Zone created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: "#/components/schemas/ZoneResponse"
              examples:
                success:
                  summary: Zone created
                  value:
                    success: true
                    data:
                      zoneId: 12
                      zoneName: "New Zone"
                      zipCodes: ["560001"]
                      ranges: ["560050-560055"]
                      notes: []
                      activeStatus: "Y"
                      createdAt: "2026-03-02T10:30:00"
                      createdBy: "Admin"
        "400":
          description: Failed to create zone (validation or conflict error)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  conflicts:
                    type: array
                    items:
                      type: object
                      properties:
                        zip:
                          type: string
                        zones:
                          type: array
                          items:
                            type: string
                  zones:
                    type: array
                    items:
                      $ref: "#/components/schemas/ZoneSummary"
              examples:
                conflict:
                  summary: Conflict detected
                  value:
                    success: false
                    message: "Conflict detected. Some zips already belong to other zones."
                    conflicts:
                      - zip: "560001"
                        zones: ["East Zone"]
                      - zip: "560052"
                        zones: ["North Zone"]
                    zones:
                      - zoneId: 1
                        zoneName: "East Zone"
                        activeStatus: "Y"
                      - zoneId: 2
                        zoneName: "North Zone"
                        activeStatus: "Y"
                invalid:
                  summary: Invalid input
                  value:
                    success: false
                    message: "Invalid range format"

    get:
      tags: [Zone]
      summary: List zones with pagination and search
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, default: 10 }
        - in: query
          name: search
          schema: { type: string }
          description: Filter zones by zoneName (case-insensitive)
      responses:
        "200":
          description: Paginated list of zones
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  total: { type: integer }
                  page: { type: integer }
                  pageSize: { type: integer }
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ZoneResponse"

  /api/maintenance/zone/{zoneId}:
    get:
      tags: [Zone]
      summary: Get zone by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: zoneId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Zone details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZoneResponse"
        "404":
          description: Zone not found

    put:
      tags: [Zone]
      summary: Update zone by ID
      description: >
        Updates an existing zone by its ID. Zone names must be unique (case-insensitive, trimmed).
        If the new zone name already exists for another zone, the request fails with a 400 error.
        Zip codes and ranges are also checked for conflicts. If conflicts are found and `force=false`,
        the response is still successful (200) but includes conflict details and the list of zones
        that already contain those zips.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: zoneId
          required: true
          schema:
            type: integer
        - in: query
          name: force
          required: false
          schema:
            type: boolean
            default: false
          description: >
            If true, allows updating a zone even if some zips already belong to other zones.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateZoneRequest"
      responses:
        "200":
          description: Zone updated successfully OR updated with conflicts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: "#/components/schemas/ZoneResponse"
                  conflicts:
                    type: array
                    items:
                      type: object
                      properties:
                        zip:
                          type: string
                        zones:
                          type: array
                          items:
                            type: object
                            properties:
                              zoneId: { type: integer }
                              zoneName: { type: string }
                  zones:
                    type: array
                    items:
                      $ref: "#/components/schemas/ZoneResponse"
              examples:
                success:
                  summary: Zone updated successfully
                  value:
                    success: true
                    message: "Zone updated successfully"
                    data:
                      zoneId: 12
                      zoneName: "Central Zone"
                      zipCodes: ["560001"]
                      ranges: ["560050-560055"]
                      notes: []
                      activeStatus: "Y"
                      createdAt: "2026-03-02T10:30:00"
                      createdBy: "Admin"
                conflict:
                  summary: Zone updated with conflicts
                  value:
                    success: true
                    message: "Conflict detected. Some zips already belong to other zones."
                    data:
                      zoneId: 12
                      zoneName: "Central Zone"
                      zipCodes: ["560001"]
                      ranges: ["560050-560055"]
                      notes: []
                      activeStatus: "Y"
                      createdAt: "2026-03-02T10:30:00"
                      createdBy: "Admin"
                    conflicts:
                      - zip: "560001"
                        zones:
                          - zoneId: 1
                            zoneName: "East Zone"
                      - zip: "560052"
                        zones:
                          - zoneId: 2
                            zoneName: "North Zone"
                    zones:
                      - zoneId: 1
                        zoneName: "East Zone"
                        zipCodes: ["560001"]
                        ranges: ["560010-560020"]
                        notes: []
                        activeStatus: "Y"
                        createdAt: "2026-01-15T09:00:00"
                        createdBy: "Admin"
                      - zoneId: 2
                        zoneName: "North Zone"
                        zipCodes: ["560052"]
                        ranges: []
                        notes: []
                        activeStatus: "Y"
                        createdAt: "2026-01-20T11:00:00"
                        createdBy: "Admin"
        "400":
          description: Failed to update zone
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
              examples:
                duplicateName:
                  summary: Duplicate zone name
                  value:
                    success: false
                    message: 'Zone name "East Zone" already exists. Zone names must be unique.'
                notFound:
                  summary: Zone not found
                  value:
                    success: false
                    message: "Zone not found"

    delete:
      tags: [Zone]
      summary: Soft delete (deactivate) a zone by ID
      description: >
        Marks the zone as inactive instead of permanently deleting it.
        Sets `activeStatus = 'N'` and updates audit fields.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: zoneId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Zone soft deleted successfully
        "400":
          description: Failed to delete zone

  /api/maintenance/zone/dropdown:
    get:
      tags: [Zone]
      summary: Get zones for dropdown
      description: >
        Returns a lightweight list of zones with zoneId, zoneName, zipCodes, and ranges.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dropdown zone list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ZoneDropdownResponse"

  /api/maintenance/zone/check-zip:
    get:
      summary: Check which zones contain a given zip code or range
      description: >
        This endpoint checks if the provided zip code belongs to any zone.
        It supports both:
        - Individual zip codes (e.g., "12345")
        - Zip ranges (e.g., "12345-12349")
        If multiple zones contain the zip(s), all zone names are returned.
        For ranges, each zip in the range is checked individually and messages are returned per zip.
      tags: [Zone]
      parameters:
        - in: query
          name: zipCode
          required: true
          schema:
            type: string
            example: "12345"
            description: >
              The zip code to check. Can be a single zip (e.g., "12345") or a range (e.g., "12345-12349").
      responses:
        "200":
          description: Zones containing the zip code(s)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: string
                    description: List of zone names that contain the zip(s)
                  message:
                    type: string
                    description: Detailed message per zip in the range
              examples:
                singleZip:
                  summary: Single zip belongs to one zone
                  value:
                    success: true
                    data: ["East Zone"]
                    message: "Zip code 12345 belongs to zone East Zone."
                rangeZip:
                  summary: Range of zips with multiple matches
                  value:
                    success: true
                    data: ["North Zone", "Central Zone"]
                    message: "Zip code 12347 belongs to North Zone. Zip code 12348 belongs to Central Zone."
                noZone:
                  summary: Zip(s) not found in any zone
                  value:
                    success: true
                    data: []
                    message: "Zip range 99990-99995 does not belong to any zone."
        "400":
          description: Invalid request (missing or malformed zipCode)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Zone:
      type: object
      properties:
        zoneId: { type: integer }
        zoneName: { type: string }
        noteThreadId: { type: integer }
        entityId: { type: integer }
        createdAt: { type: string, format: date-time }
        createdBy: { type: string }
        updatedAt: { type: string, format: date-time }
        updatedBy: { type: string }
        activeStatus:
          type: string
          enum: [Y, N]

    ZoneZip:
      type: object
      properties:
        zoneZipId: { type: integer }
        zoneId: { type: integer }
        zipCode: { type: string, nullable: true }
        rangeStart: { type: string, nullable: true }
        rangeEnd: { type: string, nullable: true }

    CreateZoneRequest:
      type: object
      required:
        - zoneName
      properties:
        zoneName: { type: string }
        zipCodes:
          type: array
          items: { type: string }
        ranges:
          type: array
          items: { type: string }
        note:
          type: object
          properties:
            messageText: { type: string }

    UpdateZoneRequest:
      type: object
      properties:
        zoneName:
          type: string
        activeStatus:
          type: string
          enum: [Y, N]
        zipCodes:
          type: array
          items:
            type: string
        ranges:
          type: array
          items:
            type: string
        note:
          type: object
          properties:
            noteId:
              type: integer
              description: Existing note ID to update (optional)
            messageText:
              type: string
              description: Note message text

    ZoneResponse:
      type: object
      properties:
        zoneId: { type: integer }
        noteThreadId: { type: integer }
        entityId: { type: integer }
        zoneName: { type: string }
        zipCodes:
          type: array
          items: { type: string }
        ranges:
          type: array
          items: { type: string }
        notes:
          type: array
          items:
            $ref: "#/components/schemas/NoteMessageResponse"
        activeStatus:
          type: string
          enum: [Y, N]
        createdAt: { type: string, format: date-time }
        createdBy: { type: string }
        updatedAt: { type: string, format: date-time }
        updatedBy: { type: string }

    NoteMessageResponse:
      type: object
      properties:
        noteId: { type: integer }
        noteThreadId: { type: integer }
        messageText: { type: string }
        createdAt: { type: string, format: date-time }
        createdBy: { type: string }

    ZoneDropdownResponse:
      type: object
      properties:
        zoneId: { type: integer }
        zoneName: { type: string }
        zipCodes:
          type: array
          items: { type: string }
        ranges:
          type: array
          items: { type: string }
