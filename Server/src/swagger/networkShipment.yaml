          description: "Shipper company name"
        addressLine1:
          type: string
          example: "123 Main Street"
          description: "Primary address line"
        line2:
          type: string
          example: "Suite 100"
          description: "Secondary address line (optional)"
        city:
          type: string
          example: "Los Angeles"
          description: "City name"
        state:
          type: string
          example: "CA"
          description: "State name"
        zipCode:
          type: string
          example: "90001"
          description: "ZIP code"
        contactPersonName:
          type: string
          example: "John Doe"
          description: "Contact person name"
        phoneNumber:
          type: string
          example: "+1-555-0123"
          description: "Contact phone number"
        entityId:
          type: integer
          description: "Entity ID (auto-generated internally)"
    ConsigneeDetails:
      type: object
      required:
        - consigneeName
        - addressLine1
        - city
        - state
        - zipCode
        - contactPersonName
        - phoneNumber
      properties:
        consigneeId:
          type: integer
          example: 0
          description: "Consignee ID (optional - if not provided, a new consignee will be created)"
        consigneeName:
          type: string
          example: "XYZ Corporation"
          description: "Consignee company name"
        addressLine1:
          type: string
          example: "456 Oak Avenue"
          description: "Primary address line"
        line2:
          type: string
          example: "Floor 5"
          description: "Secondary address line (optional)"
        city:
          type: string
          example: "New York"
          description: "City name"
        state:
          type: string
          example: "NY"
          description: "State name"
        zipCode:
          type: string
          example: "10001"
          description: "ZIP code"
        contactPersonName:
          type: string
          example: "Jane Smith"
          description: "Contact person name"
        phoneNumber:
          type: string
          example: "+1-555-0456"
          description: "Contact phone number"
        entityId:
          type: integer
          description: "Entity ID (auto-generated internally)"

    CommodityDetails:
      type: object
      required:
        - emergencyContactName
        - emergencyContactPhone
        - handlingUnits
      properties:
        emergencyContactName:
          type: string
          example: "Mike Johnson"
          description: Emergency contact name for the shipment
        emergencyContactPhone:
          type: string
          example: "+1-555-0789"
          description: Emergency contact phone number for the shipment
        handlingUnits:
          type: array
          items:
            $ref: "#/components/schemas/HandlingUnitDetails"
    HandlingUnitDetails:
      type: object
      required:
        - handlingUnitUOM
        - handlingUnits
        - unit
        - handlingLength
        - handlingWidth
        - handlingHeight
        - handlingWeight
        - handlingWeightUnit
        - class
        - palletDetails
      properties:
        handlingUnitUOM:
          type: string
          example: "Pallet"
          description: Unit of measure for the handling unit (e.g., 'Pallet', 'Box')
        handlingUnits:
          type: integer
          example: 10
          description: Number of handling units
        unit:
          type: string
          example: "Pieces"
          description: Unit of measure for the items (e.g., 'Pieces', 'Boxes')
        handlingLength:
          type: number
          format: float
          example: 48.0
          description: Length of the handling unit in inches
        handlingWidth:
          type: number
          format: float
          example: 40.0
          description: Width of the handling unit in inches
        handlingHeight:
          type: number
          format: float
          example: 60.0
          description: Height of the handling unit in inches
        handlingWeight:
          type: number
          format: float
          example: 1500.0
          description: Weight of the handling unit in pounds
        handlingWeightUnit:
          type: string
          example: "LB"
          description: Unit of measure for weight (e.g., 'LB', 'KG')
        class:
          type: string
          example: "Class 70"
          description: Freight class for the shipment
        palletDetails:
          type: array
          items:
            $ref: "#/components/schemas/PalletDetails"
    PalletDetails:
      type: object
      required:
        - pieces
        - piecesUOM
        - description
        - hazmat
        - hazmatDetails
      properties:
        pieces:
          type: integer
          example: 100
          description: Number of pieces on the pallet
        piecesUOM:
          type: string
          example: "Pieces"
          description: Unit of measure for the pieces (e.g., 'Pieces', 'Boxes')
        description:
          type: string
          example: "Standard pallet with 100 pieces"
          description: Description of the pallet
        hazmat:
          type: boolean
          example: false
          description: Indicates if the pallet contains hazardous materials
        hazmatDetails:
          type: object
          properties:
            unNumber:
              type: string
              example: "UN1234"
              description: UN number for hazardous materials
            properShippingName:
              type: string
              example: "Flammable Liquid"
              description: Proper shipping name for hazardous materials
            hazardClass:
              type: string
              example: "Class 3"
              description: Hazard class for the hazardous materials
            packingGroup:
              type: string
              example: "Packing Group II"
              description: Packing group for the hazardous materials
            weight:
              type: number
              format: float
              example: 500.0
              description: Weight of the hazardous materials in pounds
            technicalName:
              type: string
              example: "Technical Name of the Hazardous Material"
              description: Technical name for the hazardous materials (optional)
            contactPhoneNumber:
              type: string
              example: "+1-555-0000"
              description: Emergency contact phone number for hazardous materials (optional)
            hazmatDescription:
              type: string
              example: "Detailed description of the hazardous materials"
              description: Detailed description for the hazardous materials (optional)
            limitedQuantity:
              type: string
              enum: ["Y", "N"]
              example: "N"
              description: Indicates if the hazardous materials are limited quantity
            marinePollutant:
              type: string
              enum: ["Y", "N"]
              example: "N"
              description: Indicates if the hazardous materials are marine pollutants
            residueLastContained:
              type: string
              enum: ["Y", "N"]
              example: "N"
              description: Indicates if the handling unit contains residue of hazardous materials
            reportableQuantity:
              type: string
              enum: ["Y", "N"]
              example: "N"
              description: Indicates if the hazardous materials exceed reportable quantity thresholds
            dotExemption:
              type: string
              enum: ["Y", "N"]
              example: "N"
              description: Indicates if the hazardous materials are exempt from DOT regulations

    CreateShipmentRequest:
      type: object
      required:
        - shipmentDetails
        - customerDetails
        - commodityDetails
        - carrierDetails
      properties:
        shipmentDetails:
          $ref: "#/components/schemas/ShipmentDetails"
        customerDetails:
          $ref: "#/components/schemas/CustomerDetails"
        commodityDetails:
          $ref: "#/components/schemas/CommodityDetails"
        carrierDetails:
          $ref: "#/components/schemas/CarrierDetails"
    CarrierDetails:
      oneOf:
        - $ref: "#/components/schemas/CarrierDetailsPickupOnlyLineHaul"
        - $ref: "#/components/schemas/CarrierDetailsPickupOnlyLineHaulDelivery"
        - $ref: "#/components/schemas/CarrierDetailsPickupLineHaul"
        - $ref: "#/components/schemas/CarrierDetailsPickupLineHaulDelivery"
      discriminator:
        propertyName: pickupDetails
        mapping:
          PICKUP_ONLY_LINE_HAUL: "#/components/schemas/CarrierDetailsPickupOnlyLineHaul"
          PICKUP_ONLY_LINE_HAUL_DELIVERY: "#/components/schemas/CarrierDetailsPickupOnlyLineHaulDelivery"
          PICKUP_LINE_HAUL: "#/components/schemas/CarrierDetailsPickupLineHaul"
          PICKUP_LINE_HAUL_DELIVERY: "#/components/schemas/CarrierDetailsPickupLineHaulDelivery"
      description: "Carrier routing details - discriminated by pickup routing type and linehaul routing type"

    CarrierDetailsPickupOnlyLineHaul:
      type: object
      required:
        - pickupDetails
        - linehaulDetails
        - deliveryDetails
      properties:
        pickupDetails:
          allOf:
            - $ref: "#/components/schemas/PickupDetails"
            - type: object
              properties:
                pickupRouting:
                  enum: ["PICKUP_ONLY"]
        linehaulDetails:
          type: object
          required:
            - linehaulPrimaryInfo
            - linehaulCommonInfo
          properties:
            linehaulPrimaryInfo:
              allOf:
                - $ref: "#/components/schemas/LinehaulPrimaryInfo"
                - type: object
                  properties:
                    linehaulRouting:
                      enum: ["LINE_HAUL"]
                    toLocationType:
                      enum: ["Carrier"]
            linehaulCommonInfo:
              $ref: "#/components/schemas/LinehaulCommonInfo"
        deliveryDetails:
          $ref: "#/components/schemas/DeliveryDetailsFullInfo"
      description: "PICKUP_ONLY + LINE_HAUL: Full pickup, full linehaul (CARRIER), full delivery"

    CarrierDetailsPickupOnlyLineHaulDelivery:
      type: object
      required:
        - pickupDetails
        - linehaulDetails
        - deliveryDetails
      properties:
        pickupDetails:
          allOf:
            - $ref: "#/components/schemas/PickupDetails"
            - type: object
              properties:
                pickupRouting:
                  enum: ["PICKUP_ONLY"]
        linehaulDetails:
          type: object
          required:
            - linehaulPrimaryInfo
            - linehaulCommonInfo
          properties:
            linehaulPrimaryInfo:
              allOf:
                - $ref: "#/components/schemas/LinehaulPrimaryInfo"
                - type: object
                  properties:
                    linehaulRouting:
                      enum: ["LINE_HAUL_DELIVERY"]
                    toLocationType:
                      enum: ["Consignee"]
            linehaulCommonInfo:
              $ref: "#/components/schemas/LinehaulCommonInfo"
        deliveryDetails:
          $ref: "#/components/schemas/DeliveryDetailsMinimalInfo"
      description: "PICKUP_ONLY + LINE_HAUL_DELIVERY: Full pickup, full linehaul (CONSIGNEE embedded), minimal delivery (accessories + alert only)"

    CarrierDetailsPickupLineHaul:
      type: object
      required:
        - pickupDetails
        - linehaulDetails
        - deliveryDetails
      properties:
        pickupDetails:
          allOf:
            - $ref: "#/components/schemas/PickupDetails"
            - type: object
              properties:
                pickupRouting:
                  enum: ["PICKUP_LINE_HAUL"]
        linehaulDetails:
          type: object
          required:
            - linehaulCommonInfo
          properties:
            linehaulCommonInfo:
              $ref: "#/components/schemas/LinehaulCommonInfo"
          description: "Minimal linehaul - only notes and accessories, no routing details"
        deliveryDetails:
          $ref: "#/components/schemas/DeliveryDetailsFullInfo"
      description: "PICKUP_LINE_HAUL: Full pickup, minimal linehaul (notes + accessories), full delivery (CONSIGNEE)"

    CarrierDetailsPickupLineHaulDelivery:
      type: object
      required:
        - pickupDetails
        - linehaulDetails
        - deliveryDetails
      properties:
        pickupDetails:
          allOf:
            - $ref: "#/components/schemas/PickupDetails"
            - type: object
              properties:
                pickupRouting:
                  enum: ["PICKUP_LINE_HAUL_DELIVERY"]
        linehaulDetails:
          type: object
          required:
            - linehaulCommonInfo
          properties:
            linehaulCommonInfo:
              $ref: "#/components/schemas/LinehaulCommonInfo"
          description: "Minimal linehaul - only notes and accessories, no routing details"
        deliveryDetails:
          $ref: "#/components/schemas/DeliveryDetailsMinimalInfo"
      description: "PICKUP_LINE_HAUL_DELIVERY: Full pickup, minimal linehaul (notes + accessories), minimal delivery (accessories + alert only)"

    LinehaulPrimaryInfo:
      type: object
      required:
        - linehaulRouting
        - carrierId
        - terminalId
        - carrierBillNumber
        - toLocationType
        - toLocation
        - toLocationId
        - etaDate
        - etaTime
        - pieces
        - editFromLocation
        - editToLocation
      properties:
        linehaulRouting:
          type: string
          enum: ["LINE_HAUL", "LINE_HAUL_DELIVERY"]
          description: "Linehaul routing type"
        carrierId:
          type: integer
          example: 146
          description: "Carrier identifier for linehaul"
        terminalId:
          type: integer
          example: 148
          description: "Terminal identifier for linehaul"
        carrierBillNumber:
          type: string
          example: "LH-12345"
          description: "Carrier bill number for linehaul"
        toLocationType:
          type: string
          enum: ["Carrier", "Consignee"]
          description: "Destination type for linehaul routing"
        toLocation:
          type: string
          example: "Carrier Terminal"
          description: "Name of the linehaul destination"
        toLocationId:
          type: integer
          example: 456
          description: "ID of the linehaul destination"
        etaDate:
          type: string
          format: date
          example: "2024-07-01"
          description: "Estimated arrival date"
        etaTime:
          type: string
          format: time
          example: "10:00:00"
          description: "Estimated arrival time"
        pieces:
          type: integer
          example: 20
          description: "Number of pieces"
        editFromLocation:
          type: string
          enum: ["Y", "N"]
          description: "Whether from-location is edited"
        editFromLocationDetails:
          $ref: "#/components/schemas/AddressDetail"
          description: "Edited from-location address (required if editFromLocation='Y')"
        editToLocation:
          type: string
          enum: ["Y", "N"]
          description: "Whether to-location is edited"
        editToLocationDetails:
          $ref: "#/components/schemas/AddressDetail"
          description: "Edited to-location address (required if editToLocation='Y')"

    LinehaulCommonInfo:
      type: object
      required:
        - linehaulNotes
        - linehaulAccessorial
      properties:
        linehaulNotes:
          type: string
          example: "Handle with care"
          description: "Notes for the linehaul segment"
        linehaulAccessorial:
          type: string
          enum: ["Y", "N"]
          example: "N"
          description: "Whether linehaul accessories are included"
        linehaulAccessorialDetails:
          type: object
          properties:
            accessorials:
              type: array
              items:
                $ref: "#/components/schemas/AccessorialInfo"
          description: "Linehaul accessories (required if linehaulAccessorial='Y')"

    DeliveryDetailsFullInfo:
      type: object
      required:
        - deliveryPrimaryInfo
        - deliveryCommonInfo
      properties:
        deliveryPrimaryInfo:
          $ref: "#/components/schemas/DeliveryPrimaryInfo"
        deliveryCommonInfo:
          $ref: "#/components/schemas/DeliveryCommonInfo"
      description: "Full delivery details with primary info (address mapping, routing)"

    DeliveryDetailsMinimalInfo:
      type: object
      required:
        - deliveryCommonInfo
      properties:
        deliveryCommonInfo:
          $ref: "#/components/schemas/DeliveryCommonInfo"
      description: "Minimal delivery details - accessories and alerts only, no address mapping"

    DeliveryPrimaryInfo:
      type: object
      required:
        - carrierId
        - terminalId
        - carrierBillNumber
        - toLocationType
        - toLocationId
        - etaDate
        - etaTime
        - pieces
        - editFromLocation
        - editToLocation
      properties:
        carrierId:
          type: integer
          example: 146
          description: "Carrier identifier"
        terminalId:
          type: integer
          example: 148
          description: "Terminal identifier"
        carrierBillNumber:
          type: string
          example: "DL-12345"
          description: "Delivery bill number"
        toLocationType:
          type: string
          enum: ["Carrier", "Consignee"]
          example: "Consignee"
          description: "Destination type"
        toLocationId:
          type: integer
          example: 456
          description: "Destination location ID"
        etaDate:
          type: string
          format: date
          example: "2024-07-02"
          description: "Estimated delivery date"
        etaTime:
          type: string
          format: time
          example: "14:00:00"
          description: "Estimated delivery time"
        pieces:
          type: integer
          example: 20
          description: "Number of pieces"
        editFromLocation:
          type: string
          enum: ["Y", "N"]
          description: "Whether from-location is edited"
        editFromLocationDetails:
          $ref: "#/components/schemas/AddressDetail"
          description: "Edited from-location address (required if editFromLocation='Y')"
        editToLocation:
          type: string
          enum: ["Y", "N"]
          description: "Whether to-location is edited"
        editToLocationDetails:
          $ref: "#/components/schemas/AddressDetail"
          description: "Edited to-location address (required if editToLocation='Y')"

    DeliveryCommonInfo:
      type: object
      required:
        - airportTransfer
        - addDeliveryAccessorial
        - deliveryAlert
      properties:
        airportTransfer:
          type: string
          enum: ["Y", "N"]
          example: "N"
          description: "Whether airport transfer is required"
        addDeliveryAccessorial:
          type: string
          enum: ["Y", "N"]
          example: "N"
          description: "Whether delivery accessories are included"
        deliveryAccessorialDetails:
          type: object
          properties:
            accessorials:
              type: array
              items:
                $ref: "#/components/schemas/AccessorialInfo"
          description: "Delivery accessories (required if addDeliveryAccessorial='Y')"
        deliveryAlert:
          type: string
          enum: ["Y", "N"]
          example: "N"
          description: "Whether delivery alerts are enabled"
        deliveryAlertDetails:
          type: object
          properties:
            linehaulNotes:
              type: string
              example: "Keep linehaul notes for delivery"
            deliveryNotes:
              type: string
              example: "Call consignee before arrival"
            emailInfo:
              $ref: "#/components/schemas/EmailInfo"
          description: "Delivery alert details (required if deliveryAlert='Y')"
    AddressDetail:
      type: object
      required:
        - addressLine1
        - city
        - state
        - zipCode
      properties:
        addressLine1:
          type: string
          example: "123 Main Street"
          description: "Primary address line"
        line2:
          type: string
          example: "Suite 100"
          description: "Secondary address line (optional)"
        city:
          type: string
          example: "Los Angeles"
          description: "City name"
        state:
          type: string
          example: "CA"
          description: "State or province code"
        zipCode:
          type: string
          example: "90001"
          description: "ZIP or postal code"
    AccessorialInfo:
      type: object
      required:
        - accessorialId
        - chargeType
        - charges
        - notes
      properties:
        accessorialId:
          type: integer
          example: 101
          description: "Accessorial identifier"
        chargeType:
          type: string
          example: "FLAT_VALUE"
          description: "Type of accessorial charge"
        charges:
          type: number
          format: float
          example: 150.0
          description: "Charge amount for the accessorial"
        notes:
          type: string
          example: "Lift gate required"
          description: "Notes for the accessorial"
    EmailInfo:
      type: object
      required:
        - primaryEmail
        - additionalEmails
      properties:
        primaryEmail:
          type: string
          format: email
          example: "ops@example.com"
          description: "Primary email address for notifications"
        additionalEmails:
          type: array
          items:
            type: string
            format: email
          example: ["logistics@example.com"]
          description: "Additional email addresses for notifications"
    PickupDetails:
      type: object
      required:
        - pickupRouting
        - airportTransfer
        - carrierId
        - terminalId
        - fromLocation
        - editFromLocation
        - pickupAgentTerminal
        - addPickupAccessorial
        - pickupAlert
      properties:
        pickupRouting:
          type: string
          enum: ["PICKUP_ONLY", "PICKUP_LINE_HAUL", "PICKUP_LINE_HAUL_DELIVERY"]
          example: "PICKUP_LINE_HAUL"
          description: "Pickup routing for the shipment"
        airportTransfer:
          type: string
          enum: ["Y", "N"]
          example: "N"
          description: "Indicates if airport transfer is required for pickup"
        carrierId:
          type: integer
          example: 146
          description: "Carrier identifier for pickup"
        terminalId:
          type: integer
          example: 148
          description: "Terminal identifier for pickup"
        fromLocation:
          type: string
          example: "Shipper Warehouse"
          description: "Name of the pickup origin location"
        fromLocationId:
          type: integer
          example: 123
          description: "Optional ID for an existing from-location"
        editFromLocation:
          type: string
          enum: ["Y", "N"]
          example: "N"
          description: "Indicates whether the from-location address is edited"
        editFromLocationDetails:
          $ref: "#/components/schemas/AddressDetail"
          description: "New from-location address details if editFromLocation is 'Y'"
        pickupAgentTerminal:
          type: string
          enum: ["Y", "N"]
          example: "N"
          description: "Indicates whether pickup goes through a terminal agent"
        pickupAgentTerminalDetails:
          type: object
          properties:
            toLocationType:
              type: string
              enum: ["CARRIER", "CONSIGNEE"]
              example: "CARRIER"
              description: "Type of terminal destination for agent pickup"
            toLocation:
              type: string
              example: "Carrier Terminal"
              description: "Name of the terminal destination"
            toLocationId:
              type: integer
              example: 200
              description: "Optional destination location ID"
            editToLocation:
              type: string
              enum: ["Y", "N"]
              example: "N"
              description: "Indicates whether the to-location address is edited"
            editToLocationDetails:
              $ref: "#/components/schemas/AddressDetail"
              description: "New to-location address details if editToLocation is 'Y'"
        addPickupAccessorial:
          type: string
          enum: ["Y", "N"]
          example: "N"
          description: "Indicates whether pickup accessorials are included"
        pickupAccessorialDetails:
          type: object
          properties:
            accessorials:
              type: array
              items:
                $ref: "#/components/schemas/AccessorialInfo"
          description: "List of pickup accessorials"
        pickupAlert:
          type: string
          enum: ["Y", "N"]
          example: "N"
          description: "Indicates whether pickup alerts are enabled"
        pickupAlertDetails:
          type: object
          properties:
            inboundNotes:
              type: string
              example: "Pickup after 9 AM"
              description: "Notes for the pickup alert"
            emailInfo:
              $ref: "#/components/schemas/EmailInfo"
          description: "Details for pickup alert notifications"
    Error:
      type: object
      properties:
        message:
          type: string
          description: Error message describing the issue
