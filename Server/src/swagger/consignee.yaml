openapi: 3.0.0
info:
  title: Consignee API
  version: 1.0.0
  description: API for managing consignees, including dropdown search functionality
tags:
  - name: Consignee
    description: Operations related to consignees
paths:
  /api/maintenance/consignee/dropdown:
    get:
      tags: [Consignee]
      summary: Get consignee information for dropdown search
      security:
        - bearerAuth: []
      parameters:
        - name: searchTerm
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of consignees matching the search term
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NetworkShipmentConsigneeInfo"
        "400":
          description: Invalid search term provided
