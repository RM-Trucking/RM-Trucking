openapi: 3.0.0
info:
  title: Shipper API
  version: 1.0.0
  description: API for managing shippers, including dropdown search functionality
tags:
  - name: Shipper
    description: Operations related to shippers
paths:
  /api/maintenance/shipper/dropdown:
    get:
      tags: [Shipper]
      summary: Get shipper information for dropdown search
      security:
        - bearerAuth: []
      parameters:
        - name: searchTerm
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of shippers matching the search term
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NetworkShipmentShipperInfo"
        "400":
          description: Invalid search term provided
